services:
  - type: web
    name: dhatu-scan-backend
    env: python
    region: ohio
    buildCommand: |
      cd python-backend
      pip install -r requirements.txt
      pip install uvicorn gunicorn
    startCommand: "cd python-backend && uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
