services:
  - type: web
    name: dhatu-scan-backend
    env: python
    region: ohio
    rootDir: dhatu-scan/python-backend
    buildCommand: |
      pip install -r requirements.txt
      pip install uvicorn gunicorn
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
